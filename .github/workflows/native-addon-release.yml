# Native Addon Release Workflow
# Triggers on tags matching v*
# Builds Debug and Release for Windows and Linux, publishes release assets
#
# Linux: polyphaselabs/polyphase-engine Docker image (engine + toolchain pre-baked).
# Windows: Vulkan SDK + MSBuild + cloned engine (mirrors engine's release.yml).
#
# Usage: Tag a release: git tag v1.0.0 && git push origin v1.0.0
#
# Local testing:
#   Windows: set POLYPHASE_PATH=C:\path\to\engine && .github\workflows\build.bat
#   Linux:   POLYPHASE_PATH=/path/to/engine ./.github/workflows/build.sh

name: Native Addon Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  POLYPHASE_REPO: "Polyphase-Labs/Polyphase-Engine"
  POLYPHASE_ENGINE_IMAGE: "polyphaselabs/polyphase-engine:latest"

jobs:
  build-linux:
    runs-on: ubuntu-latest
    container:
      image: polyphaselabs/polyphase-engine:latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Mark workspace safe for git
        run: git config --global --add safe.directory '*'

      - name: Read addon name from package.json
        run: |
          ADDON_NAME=$(cat package.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('native',{}).get('binaryName') or d.get('name'))")
          echo "ADDON_NAME=$ADDON_NAME" >> $GITHUB_ENV

      - name: Build Both Configs (Linux)
        run: |
          chmod +x .github/workflows/build.sh
          export POLYPHASE_PATH="/polyphase"
          ./.github/workflows/build.sh "$ADDON_NAME" Both

      - name: Upload Linux Release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ADDON_NAME }}-Linux-x64-Release
          path: |
            build/Linux/x64/Release/lib${{ env.ADDON_NAME }}.so
            build/Linux/x64/Release/*.sha256

      - name: Upload Linux Debug artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ADDON_NAME }}-Linux-x64-Debug
          path: |
            build/Linux/x64/Debug/lib${{ env.ADDON_NAME }}.so
            build/Linux/x64/Debug/*.sha256

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read addon name from package.json
        shell: bash
        run: |
          ADDON_NAME=$(cat package.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('native',{}).get('binaryName') or d.get('name'))")
          echo "ADDON_NAME=$ADDON_NAME" >> $GITHUB_ENV

      - name: Clone Polyphase Engine
        shell: bash
        run: git clone --depth 1 https://github.com/${{ env.POLYPHASE_REPO }}.git ../polyphase-engine

      - name: Initialize engine submodules
        shell: bash
        working-directory: ../polyphase-engine
        run: |
          git submodule init -- External/bullet3 External/doxygen-awesome-css Engine/External/PolyVox || true
          git submodule update --recursive || true

      - name: Install Vulkan SDK
        shell: pwsh
        run: |
          $VER = "1.3.275.0"
          Invoke-WebRequest -Uri "https://sdk.lunarg.com/sdk/download/$VER/windows/VulkanSDK-$VER-Installer.exe" -OutFile "$env:TEMP\VulkanSDK.exe"
          Start-Process -FilePath "$env:TEMP\VulkanSDK.exe" -ArgumentList "--accept-licenses --default-answer --confirm-command install" -Wait
          echo "VULKAN_SDK=C:\VulkanSDK\$VER" >> $env:GITHUB_ENV

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build Both Configs (Windows)
        shell: cmd
        run: |
          set "POLYPHASE_PATH=..\polyphase-engine"
          call .github\workflows\build.bat %ADDON_NAME% Both

      - name: Upload Windows Release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ADDON_NAME }}-Windows-x64-Release
          path: |
            build/Windows/x64/Release/${{ env.ADDON_NAME }}.dll
            build/Windows/x64/Release/*.sha256

      - name: Upload Windows Debug artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ADDON_NAME }}-Windows-x64-Debug
          path: |
            build/Windows/x64/Debug/${{ env.ADDON_NAME }}.dll
            build/Windows/x64/Debug/*.sha256
            build/Windows/x64/Debug/*.pdb

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Read addon name from package.json
        run: |
          ADDON_NAME=$(cat package.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('native',{}).get('binaryName') or d.get('name'))")
          echo "ADDON_NAME=$ADDON_NAME" >> $GITHUB_ENV

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Update package.json with binary descriptors
        run: |
          sudo apt-get install -y jq
          BINARIES="[]"
          [ -f "artifacts/${{ env.ADDON_NAME }}-Windows-x64-Release/${{ env.ADDON_NAME }}.dll" ] && \
            BINARIES=$(echo "$BINARIES" | jq '. += [{"platform": "Windows", "arch": "x64", "config": "Release", "type": "releaseAsset", "value": "${{ env.ADDON_NAME }}-Windows-x64-Release.dll"}]')
          [ -f "artifacts/${{ env.ADDON_NAME }}-Windows-x64-Debug/${{ env.ADDON_NAME }}.dll" ] && \
            BINARIES=$(echo "$BINARIES" | jq '. += [{"platform": "Windows", "arch": "x64", "config": "Debug", "type": "releaseAsset", "value": "${{ env.ADDON_NAME }}-Windows-x64-Debug.dll"}]')
          [ -f "artifacts/${{ env.ADDON_NAME }}-Linux-x64-Release/lib${{ env.ADDON_NAME }}.so" ] && \
            BINARIES=$(echo "$BINARIES" | jq '. += [{"platform": "Linux", "arch": "x64", "config": "Release", "type": "releaseAsset", "value": "lib${{ env.ADDON_NAME }}-Linux-x64-Release.so"}]')
          [ -f "artifacts/${{ env.ADDON_NAME }}-Linux-x64-Debug/lib${{ env.ADDON_NAME }}.so" ] && \
            BINARIES=$(echo "$BINARIES" | jq '. += [{"platform": "Linux", "arch": "x64", "config": "Debug", "type": "releaseAsset", "value": "lib${{ env.ADDON_NAME }}-Linux-x64-Debug.so"}]')
          jq --argjson binaries "$BINARIES" '.binaries = $binaries | .resolveMode = "binary"' package.json > package.json.updated
          mv package.json.updated package.json

      - name: Prepare release files
        run: |
          mkdir -p release
          for dir in artifacts/*/; do
            artifact_name=$(basename "$dir")
            config="${artifact_name##*-}"
            platform_arch="${artifact_name%-*}"
            platform_arch="${platform_arch#*-}"
            for file in "$dir"*; do
              if [ -f "$file" ]; then
                filename=$(basename "$file")
                if [[ "$filename" == *.dll ]]; then
                  base="${filename%.dll}"
                  cp "$file" "release/${base}-${platform_arch}-${config}.dll"
                elif [[ "$filename" == *.so ]]; then
                  base="${filename%.so}"
                  cp "$file" "release/${base}-${platform_arch}-${config}.so"
                elif [[ "$filename" == *.pdb ]]; then
                  base="${filename%.pdb}"
                  cp "$file" "release/${base}-${platform_arch}-${config}.pdb"
                else
                  cp "$file" "release/"
                fi
              fi
            done
          done
          cp package.json "release/package.json"
          ls -la release/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release/*
          generate_release_notes: true
